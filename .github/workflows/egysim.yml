name: egysim Ultimate Production Engine

on: 
  push:
  issues:
    types: [opened]

jobs:
  egysim_production:
    runs-on: ubuntu-latest
    permissions: # إضافة صلاحيات الكتابة للرد على الـ Issues
      issues: write
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # تحديث لـ v4

      - name: Set up Python
        uses: actions/setup-python@v5 # تحديث لـ v5
        with:
          python-version: '3.10'

      - name: Run egysim Engine
        run: |
          # تمرير عنوان الـ Issue أو رسالة الـ Commit كمحرك للوكيل
          python app.py "${{ github.event.issue.title || github.event.head_commit.message }}"

      - name: Upload Final Delivery
        uses: actions/upload-artifact@v4 # الحل: تم التحديث من v3 إلى v4
        with:
          name: egysim-delivery-artifact
          path: egysim_delivery.md
          retention-days: 5
