- name: 🚀 Run egysim Web Internal Test
        run: |
          # تشغيل واجهة Streamlit مع تحديد المنفذ والارتباط بـ 0.0.0.0 لضمان الرؤية
          nohup streamlit run app_web.py --server.port 8501 --server.address 0.0.0.0 --server.headless true &
          
          # استراتيجية الانتظار الذكي (Retry Loop)
          echo "Waiting for Streamlit to start..."
          timeout 60s bash -c 'until curl -sf http://localhost:8501; do sleep 5; done' || (echo "Streamlit failed to start" && exit 1)
          
          echo "egysim Web is Up and Running!"
